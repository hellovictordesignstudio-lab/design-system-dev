<style>
  /* Before ThemeProvider: sane defaults so text is never “white on white” */
  html {
    color-scheme: light dark;
  }
  html[data-theme='light'],
  html:not([data-theme]) {
    color-scheme: light;
  }
  html[data-theme='dark'] {
    color-scheme: dark;
  }

  html,
  body,
  #storybook-root,
  #storybook-docs {
    background: var(--color-bg-canvas, #ffffff);
    color: var(--color-text-primary, #0c0d10);
  }

  html[data-theme='dark'],
  html[data-theme='dark'] body,
  html[data-theme='dark'] #storybook-root,
  html[data-theme='dark'] #storybook-docs {
    background: var(--color-bg-canvas, #0c0d10) !important;
    color: var(--color-text-primary, #f5f5f7) !important;
  }
